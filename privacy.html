<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy | NetVelocity</title>
    <meta http-equiv="refresh" content="3; url=https://sites.google.com/view/netvelocity-privacy-policy/home">
    <style>
        /* Base Styles */
        :root {
            --primary-color: #0d6efd;
            --dark-bg: #121212;
            --text-light: #f8f9fa;
            --text-muted: #adb5bd;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: var(--primary-color);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        .logo a {
            color: #fff;
        }

        .content-section {
            padding: 60px 0;
            min-height: 60vh;
        }

        .content-section h1 {
            margin-bottom: 20px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid #333;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="logo"><a href="index.html">NetVelocity</a></div>
        </header>

        <section class="content-section">
            <h1>Privacy Policy</h1>

    </div>

    <div class="container">
        <footer>
            <p>&copy; 2026 NetVelocity. All rights reserved.</p>
        </footer>
    </div>

</body>

</html>
